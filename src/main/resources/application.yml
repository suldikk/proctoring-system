spring:
  application:
    name: proctoring-system
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/proctoring}
    username: ${DB_USER:proctoring}
    password: ${DB_PASSWORD:proctoring}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_FILE_SIZE:25MB}
      max-request-size: ${MAX_UPLOAD_REQUEST_SIZE:25MB}

proctoring:
  storage:
    root: ${PROCTORING_STORAGE_ROOT:storage/proctoring}

security:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-change-me}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
